spring:
  application:
    name: sd-quoted-securities-service

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true   # /actuator/health/liveness + /readiness for K8s probes
  info:
    env:
      enabled: true

info:
  bian:
    serviceDomain: "Quoted Securities Service"
    businessArea: "Reference Data"
    businessDomain: "Reference Data"
    functionalPattern: "Catalog"
    assetType: "Securities Reference Data"
    controlRecord: "Securities Reference Data Directory Entry"

resilience4j:
  circuitbreaker:
    instances:
      serviceDomain:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
